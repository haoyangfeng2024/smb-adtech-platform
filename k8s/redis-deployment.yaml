apiVersion: apps/v1
kind: Deployment
metadata:
  name: adtech-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adtech-redis
  template:
    metadata:
      labels:
        app: adtech-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: adtech-redis
spec:
  selector:
    app: adtech-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
